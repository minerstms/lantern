<!-- ===== TMS Lantern — Games ===== -->
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>window.LANTERN_AVATAR_API = 'https://lantern-api.mrradle.workers.dev';</script>
  <title>TMS Lantern — Games</title>
  <link rel="stylesheet" href="css/lantern-ticker.css">
  <link rel="stylesheet" href="css/lantern-header.css">
  <link rel="stylesheet" href="css/lantern-cards.css">
  <link rel="prefetch" href="locker.html">
  <link rel="prefetch" href="explore.html">
  <link rel="prefetch" href="explore.html">
  <link rel="prefetch" href="locker.html#store">
  <link rel="prefetch" href="teacher.html">

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1b33;
      --ink:#eaf0ff;
      --muted:#b9c6ea;
      --accent:#5aa7ff;
      --good:#38d07c;
      --bad:#ff4d6d;
      --warn:#ffcc66;
      --line: rgba(255,255,255,.12);
      --shadow: 0 12px 28px rgba(0,0,0,.35);
      --r: 18px;
      --blue1:#0f3b86;
      --blue2:#1e63d6;
      --fsBase: 22px;
      --fsButton: 28px;
    }
    *{box-sizing:border-box}
    html,body{ min-height: 100%; margin: 0; }
    body{
      background:
        radial-gradient(1200px 600px at 50% 0%, #0b244f 0%, rgba(11,36,79,0) 55%),
        radial-gradient(900px 500px at 20% 30%, rgba(46,105,214,.18) 0%, rgba(46,105,214,0) 60%),
        linear-gradient(180deg, #070b12, #05070b);
      background-attachment: fixed;
      color: var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: var(--fsBase);
      overflow-x: hidden;
    }
    a{color:inherit}
    /* Outer shell: lantern-header.css .wrap.lanternContent */

    .gamesPageShell{ margin-bottom: 24px; position: relative; }
    /* Match explore.html rail row titles: first label establishes page context */
    .gamesPageShell .sectionHd{
      font-weight: 900;
      font-size: 26px;
      margin-bottom: 4px;
      letter-spacing: .2px;
      padding: 14px var(--lantern-pad-x) 0;
      color: var(--ink);
    }
    .gamesPageWalletRow{
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin: 0 0 8px;
    }
    .gamesPageWalletLink{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,204,102,.45);
      background: rgba(255,204,102,.12);
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      font-size: 20px;
      line-height: 1.2;
    }
    .gamesPageWalletLink:hover{ background: rgba(255,204,102,.22); border-color: rgba(255,204,102,.65); }
    .gamesPageWalletAmt{ color: #ffcc66; font-weight: 900; min-width: 1ch; font-size: 22px; }
    .gamesPageWalletLbl{ color: var(--muted); font-size: 20px; font-weight: 800; }
    .gamesRailSection{ margin-bottom: 28px; }
    .gameLocked{ color: var(--bad); font-weight: 800; font-size: 22px; margin-bottom: 8px; text-align: center; }
    .dailyHuntHint{
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid rgba(242,194,48,.4);
      background: rgba(242,194,48,.12);
      font-size: 22px;
      font-weight: 800;
      color: var(--warn);
      text-align: center;
    }
    .dailyHuntHint.found{ border-color: rgba(56,208,124,.4); background: rgba(56,208,124,.12); color: var(--good); }
    .dailyHuntNugget{
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      animation: dailyHuntSparkle 2s ease-in-out infinite;
      opacity: 0.82;
    }
    .dailyHuntNugget img{ width: 36px; height: 36px; object-fit: contain; }
    .dailyHuntNugget:hover{ opacity: 1; transform: scale(1.12); }
    .dailyHuntNugget:active{ transform: scale(0.95); }
    @keyframes dailyHuntSparkle{
      0%,100%{ filter: drop-shadow(0 0 6px rgba(242,194,48,.6)); opacity: 0.9; }
      50%{ filter: drop-shadow(0 0 14px rgba(242,194,48,.9)); opacity: 1; }
    }
    .btn{
      height: 52px;
      padding: 0 20px;
      border-radius: 14px;
      border: 2px solid rgba(90,167,255,.4);
      background: linear-gradient(180deg, rgba(90,167,255,.2), rgba(90,167,255,.08));
      color: var(--ink);
      font-weight: 900;
      font-size: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.good{ border-color: rgba(56,208,124,.5); background: linear-gradient(180deg, rgba(56,208,124,.25), rgba(56,208,124,.1)); font-size: 24px; padding: 0 28px; height: 56px; }
    .btn:disabled{ opacity: .6; cursor: not-allowed; }

    .gameArea{
      margin-top: 16px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(0,0,0,.2);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .gameArea .big{ font-size: 36px; font-weight: 1000; }
    .gameArea .tapZone{
      width: 100%;
      min-height: 180px;
      border: 3px dashed var(--line);
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
    }
    .gameArea .tapZone.ready{ border-color: var(--accent); background: rgba(90,167,255,.1); }
    .gameArea .tapZone.go{ border-color: var(--good); background: rgba(56,208,124,.15); }
    .gamesArcadeEmbeddedSurfaces{
      margin: 12px 0 0;
      max-width: 100%;
    }
    .memGrid{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .memCard{
      width: 64px;
      height: 64px;
      border-radius: 12px;
      border: 2px solid var(--line);
      background: rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
    }
    .memCard.flipped{ background: rgba(90,167,255,.2); }
    .memCard.matched{ opacity: .5; cursor: default; }
    .huntArea{
      position: relative;
      width: 100%;
      min-height: 220px;
      border: 2px solid var(--line);
      border-radius: var(--r);
      background: rgba(0,0,0,.3);
    }
    .huntNugget{
      position: absolute;
      width: 40px;
      height: 40px;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 22px;
      z-index: 10000;
      display: none;
    }

    /* Nugget Hunt fullscreen overlay */
    .nuggetHuntOverlay{
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
    }
    .nuggetHuntOverlay.open{ display: flex; }
    .nuggetHuntOverlay .overlayTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: var(--lantern-page-max-width, 980px);
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nuggetHuntOverlay .difficultyRow{
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .nuggetHuntOverlay .difficultyBtn{
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 800;
      border: 2px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      cursor: pointer;
    }
    .nuggetHuntOverlay .difficultyBtn.active{
      border-color: var(--accent);
      color: var(--ink);
      background: rgba(90,167,255,.15);
    }
    .nuggetHuntOverlay .targetText{
      font-size: 26px;
      font-weight: 900;
      color: var(--warn);
      flex: 1;
      min-width: 200px;
    }
    .nuggetHuntOverlay .overlayTimer{
      font-size: 28px;
      font-weight: 900;
      color: var(--muted);
    }
    .nuggetHuntOverlay .overlayBtns{
      display: flex;
      gap: 10px;
    }
    .nuggetHuntOverlay .overlayBtn{
      height: 48px;
      padding: 0 18px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 22px;
      border: 0;
      cursor: pointer;
      user-select: none;
    }
    .nuggetHuntOverlay .overlayBtn.exit{
      background: rgba(255,77,109,.25);
      color: var(--bad);
      border: 2px solid rgba(255,77,109,.5);
    }
    .nuggetHuntOverlay .overlayBtn.replay{
      background: rgba(56,208,124,.2);
      color: var(--good);
      border: 2px solid rgba(56,208,124,.5);
    }
    .nuggetHuntOverlay .boardWrap{
      flex: 1;
      width: 100%;
      max-width: var(--lantern-page-max-width, 980px);
      min-height: 200px;
      overflow: auto;
      border: 2px solid var(--line);
      border-radius: var(--r);
      background: rgba(0,0,0,.25);
      padding: 12px;
    }
    .nuggetHuntOverlay .iconGrid{
      display: grid;
      gap: 8px;
      margin: 0 auto;
      justify-content: center;
    }
    .nuggetHuntOverlay .iconCell{
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: transform .08s ease, border-color .1s ease;
    }
    .nuggetHuntOverlay .iconCell:hover{ transform: scale(1.08); border-color: var(--accent); }
    .nuggetHuntOverlay .iconCell:active{ transform: scale(0.96); }
    .nuggetHuntOverlay .iconCell.wrong{ border-color: var(--bad); background: rgba(255,77,109,.2); animation: wrongShake 0.3s ease; }
    @keyframes wrongShake{
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }
    .nuggetHuntOverlay .resultBanner{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 24px 32px;
      border-radius: var(--r);
      font-size: 32px;
      font-weight: 900;
      text-align: center;
      z-index: 10;
      display: none;
      pointer-events: none;
    }
    .nuggetHuntOverlay .resultBanner.show{ display: block; }
    .nuggetHuntOverlay .resultBanner.win{ background: rgba(56,208,124,.25); border: 3px solid var(--good); color: var(--good); }
    .nuggetHuntOverlay .resultBanner.lose{ background: rgba(255,77,109,.2); border: 3px solid var(--bad); color: var(--bad); }

    /* Off-DOM play triggers — game scripts keep getElementById; cards proxy .click() here */
    .gamesPlayTriggersHost{
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
      pointer-events: none;
    }
    .gamesPlayTriggersHost button{ position: absolute; opacity: 0; width: 1px; height: 1px; }

    /* Culture game overlay: shared with .lanternOverlayBelowNav (header clearance) */
    .cultureGameOverlay{
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .cultureGameOverlay.open{ display: flex; }
    .cultureGameOverlay .overlayTop{
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 520px;
      margin-bottom: var(--lantern-space-md);
      flex-wrap: wrap;
      gap: 10px;
    }
    .cultureGameOverlay .overlayTitle{ font-weight: 900; font-size: 26px; }
    .cultureGameOverlay .overlayScore{ font-size: 22px; font-weight: 800; color: var(--warn); }
    .cultureGameOverlay .overlayBackBtn{
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 22px;
      border: 2px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--ink);
      cursor: pointer;
    }
    .cultureGameOverlay .gameBody{ width: 100%; max-width: 520px; min-height: 200px; }
    .cultureGameOverlay .avatarMatchImgWrap{
      width: 160px; height: 160px;
      margin: 0 auto 24px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(145deg, var(--blue1), var(--panel));
      border: 4px solid rgba(90,167,255,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .cultureGameOverlay .avatarMatchImgWrap img{ width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1; }
    .cultureGameOverlay .avatarMatchImgWrap .avatarFallback{
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 0;
      background: linear-gradient(145deg, var(--blue1), var(--panel));
    }
    .cultureGameOverlay .avatarMatchImgWrap .avatarFallback.avatarFallbackHidden{ display: none; }
    .cultureGameOverlay .avatarMatchImgWrap .avatarInitial{
      font-size: 64px; font-weight: 900; color: var(--accent); text-transform: uppercase; line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .cultureGameOverlay .avatarMatchImgWrap .avatarEmoji{ font-size: 72px; line-height: 1; }
    .cultureGameOverlay .avatarMatchPrompt{ font-size: 24px; font-weight: 900; margin-bottom: 20px; color: var(--ink); }
    .cultureGameOverlay .avatarMatchScoreRow{ display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; font-size: 22px; font-weight: 800; }
    .cultureGameOverlay .avatarMatchScoreRow .round{ color: var(--muted); }
    .cultureGameOverlay .avatarMatchScoreRow .score{ color: var(--warn); }
    .cultureGameOverlay .choiceBtn{
      display: block;
      width: 100%;
      text-align: center;
      padding: 18px 24px;
      margin-bottom: 14px;
      border-radius: 14px;
      border: 3px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s ease, background .15s ease, transform .08s ease;
    }
    .cultureGameOverlay .choiceBtn:hover{ background: rgba(90,167,255,.25); border-color: var(--accent); transform: scale(1.02); }
    .cultureGameOverlay .choiceBtn:active{ transform: scale(0.98); }
    .cultureGameOverlay .choiceBtn.correct{ border-color: var(--good); background: rgba(56,208,124,.35); color: var(--ink); }
    .cultureGameOverlay .choiceBtn.wrong{ border-color: var(--bad); background: rgba(255,77,109,.25); color: var(--ink); }
    .cultureGameOverlay .triviaQuestion{ font-weight: 900; font-size: 24px; margin-bottom: var(--lantern-space-lg); line-height: 1.3; }
    .cultureGameOverlay .resultMsg{ font-size: 28px; font-weight: 900; text-align: center; margin: 20px 0; }
    .cultureGameOverlay .resultMsg.win{ color: var(--good); }
    .cultureGameOverlay .avatarMatchResultScore{ font-size: 32px; margin-top: 12px; color: var(--warn); }

  </style>
</head>
<body class="page-has-ticker">
  <script src="js/lantern-canonical-route-boot.js"></script>
  <div id="lanternHeader">
    <div id="lanternTicker"></div>
    <div id="lanternAppBarRoot"></div>
  </div>
  <div class="wrap lanternContent gamesPageWrap">
    <div id="classAccessBannerEl" hidden aria-hidden="true"></div>
    <div id="classAccessGateWrap" style="display:none;position:fixed;inset:0;z-index:9999;background:#0b1220;overflow:auto;padding:24px;"></div>
    <div id="classAccessContentWrap" style="visibility:hidden;opacity:0;">
    <div class="gamesPageShell">
    <div id="dailyHuntHintEl" class="dailyHuntHint" style="display:none;"></div>
    <div id="dailyHuntNuggetEl" class="dailyHuntNugget" style="display:none;" title="Click to claim!"><img src="assets/icons/nugget.png" alt="Hidden nugget"></div>

    <section class="gamesRailSection" aria-label="Featured games" data-help="games">
      <div class="sectionHd">Featured Games</div>
      <div id="gamesFeaturedScroller" data-lantern-rail-host="true" data-scroller-aria-label="Featured games"></div>
    </section>

    <section class="gamesRailSection" id="gamesSectionDaily" aria-label="Nugget games" data-help="games">
      <div id="gamesArcadeScroller" data-lantern-rail-host="true" data-scroller-aria-label="Arcade games"></div>
    </section>

    <section class="gamesRailSection" data-help="culture_games" aria-label="Culture games">
      <div id="gamesCultureScroller" data-lantern-rail-host="true" data-scroller-aria-label="Culture games"></div>
    </section>

    <section class="gamesRailSection" id="leaderboardSection" aria-label="Leaderboards">
      <div id="leaderboardSummariesEl">
        <div id="leaderboardSummariesScroller" data-lantern-rail-host="true" data-scroller-aria-label="Leaderboard summaries"></div>
      </div>
    </section>

    <section class="gamesRailSection" id="gameHighlightsSection" aria-label="Weekly pace">
      <div id="gameHighlightsScroller" data-lantern-rail-host="true" data-scroller-aria-label="This week pace"></div>
    </section>

    <div id="gamesPlayTriggersHost" class="gamesPlayTriggersHost" aria-hidden="true">
      <button type="button" id="avatarMatchPlayBtn"></button>
      <button type="button" id="handbookTriviaPlayBtn"></button>
      <button type="button" id="localHistoryTriviaPlayBtn"></button>
      <button type="button" id="reactionPlayBtn"></button>
      <button type="button" id="clickrushPlayBtn"></button>
      <button type="button" id="memoryPlayBtn"></button>
      <button type="button" id="nuggetHuntPlayBtn"></button>
    </div>

    <div id="gamesArcadeEmbeddedSurfaces" class="gamesArcadeEmbeddedSurfaces" aria-hidden="true">
      <div class="gameLocked" id="reactionLocked" style="display:none;">Need at least 1 nugget to play.</div>
      <div class="gameArea" id="reactionArea" style="display:none;"><div class="big" id="reactionMsg">Get ready...</div><div class="tapZone" id="reactionTapZone">Tap when you see GO</div></div>
      <div class="gameLocked" id="clickrushLocked" style="display:none;">Need at least 1 nugget to play.</div>
      <div class="gameArea" id="clickrushArea" style="display:none;"><div class="big" id="clickrushCount">0</div><div class="big" id="clickrushTimer">10</div><div class="tapZone" id="clickrushTapZone">Tap here!</div></div>
      <div class="gameLocked" id="memoryLocked" style="display:none;">Need at least 1 nugget to play.</div>
      <div class="gameArea" id="memoryArea" style="display:none;"><div class="memGrid" id="memoryGrid"></div></div>
      <div class="gameLocked" id="nuggetHuntLocked" style="display:none;">Need at least 1 nugget to play.</div>
    </div>

    </div>
  </div>

  <!-- Nugget Hunt fullscreen overlay -->
  <div class="nuggetHuntOverlay lanternOverlayBelowNav" id="nuggetHuntOverlay">
    <div class="overlayTop">
      <div class="targetText" id="nuggetHuntTargetText">Find the Golden Nugget</div>
      <div class="difficultyRow" id="nuggetHuntDifficultyRow">
        <button type="button" class="difficultyBtn" data-diff="easy">Easy</button>
        <button type="button" class="difficultyBtn active" data-diff="medium">Medium</button>
        <button type="button" class="difficultyBtn" data-diff="hard">Hard</button>
      </div>
      <div class="overlayTimer" id="nuggetHuntTimer">0:00</div>
      <div class="overlayBtns">
        <button type="button" class="overlayBtn exit" id="nuggetHuntExitBtn">Exit</button>
        <button type="button" class="overlayBtn replay" id="nuggetHuntReplayBtn" style="display:none;">Replay</button>
      </div>
    </div>
    <div class="boardWrap" id="nuggetHuntBoardWrap">
      <div class="iconGrid" id="nuggetHuntIconGrid"></div>
    </div>
    <div class="resultBanner" id="nuggetHuntResultBanner"></div>
  </div>
  </div>

  <!-- Culture games shared overlay -->
  <div class="cultureGameOverlay lanternOverlayBelowNav" id="cultureGameOverlay">
    <div class="overlayTop">
      <span class="overlayTitle" id="cultureGameOverlayTitle">Game</span>
      <span class="overlayScore" id="cultureGameOverlayScore"></span>
      <button type="button" class="overlayBackBtn" id="cultureGameOverlayBackBtn">Back</button>
    </div>
    <div class="gameBody" id="cultureGameBody"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/lantern-game-content.js"></script>
  <script src="js/lantern-data.js"></script>
  <script src="js/class-access.js"></script>
  <script src="js/lantern-api.js"></script>
  <script src="js/lantern-broadcast.js"></script>
  <script src="js/lantern-ticker.js"></script>
  <script src="js/lantern-avatar.js"></script>
  <script src="js/lantern-nav.js"></script>
  <script src="js/lantern-route-help.js"></script>
  <script src="js/lantern-help.js"></script>
  <script src="js/lantern-scroller.js"></script>
  <script src="js/lantern-cards.js"></script>
  <script>
    (function(){ try { if (window.LANTERN_DATA) { if (window.LANTERN_DATA.ensureCharacters) window.LANTERN_DATA.ensureCharacters(); if (window.LANTERN_DATA.ensureCatalog) window.LANTERN_DATA.ensureCatalog(); if (window.LANTERN_DATA.ensureStartupMode) window.LANTERN_DATA.ensureStartupMode(); } } catch(e){} })();
    var LS_ADOPTED = 'LANTERN_ADOPTED_CHARACTER';
    var createRun = (typeof LANTERN_API !== 'undefined' && LANTERN_API.createRun) ? LANTERN_API.createRun : null;
    var run = createRun ? createRun() : null;

          if (!tRes || !tRes.ok) { if (onFailure) onFailure(); return; }

      if (economyApiBase) {
        fetch(economyApiBase + '/api/economy/transact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ character_name: adopted.name, delta: -1, kind: 'game_play', source: '', note: gameName || 'Game', meta: {} })
        }).then(function(r){ return r.json(); }).then(function(tRes){

    function wireGamesHubCardClicks(){
      var shell = document.querySelector('.gamesPageShell');
      if (!shell || shell._gamesHubCardClickWired) return;
      shell._gamesHubCardClickWired = true;
      function gameAreaForProxyPlay(pid){
        if (pid === 'reactionPlayBtn') return el('reactionArea');
        if (pid === 'clickrushPlayBtn') return el('clickrushArea');
        if (pid === 'memoryPlayBtn') return el('memoryArea');
        return null;
      }
      function proxyPlayFromCard(card){
        if (!card) return;
        var pid = (card.getAttribute('data-games-proxy-play') || '').trim();
        var target = pid && el(pid);
        if (!target) return;
        if (target.disabled) {
          toast('Need at least 1 nugget to play.');
          return;
        }
        target.click();
      }
      shell.addEventListener('click', function(e){
        if (e.target.closest('.exploreCardReportBtn')) return;
        if (e.target.closest('a.exploreCard')) return;
        var card = e.target.closest('.gamesHubPlayCard[data-games-proxy-play]');
        if (!card) return;
        var pid = (card.getAttribute('data-games-proxy-play') || '').trim();
        var ga = gameAreaForProxyPlay(pid);
        if (ga){
          var cs = window.getComputedStyle(ga);
          var gaLive = cs.display !== 'none' && cs.visibility !== 'hidden';
          if (gaLive && !e.target.closest('.gameArea')) return;
        }
        e.preventDefault();
        proxyPlayFromCard(card);
      });
      shell.addEventListener('keydown', function(e){
        if (e.key !== 'Enter' && e.key !== ' ') return;
        if (e.target.closest('.exploreCardReportBtn')) return;
        var card = e.target.closest('.gamesHubPlayCard[data-games-proxy-play]');
        if (!card || e.target !== card) return;
        e.preventDefault();
        proxyPlayFromCard(card);
      });
    }

    var RESULT_DELAY_MS = 2500;

    // ---- Reaction Tap: ready → playing → result → auto-reset → ready ----
    (function(){
      var playBtn = el('reactionPlayBtn');
      var area = el('reactionArea');
      var msg = el('reactionMsg');
      var tapZone = el('reactionTapZone');
      var goInterval = null;

      function clearReactionState(){
        if (goInterval) { clearInterval(goInterval); goInterval = null; }
        tapZone._goShown = false;
        tapZone._done = false;
        tapZone._start = null;
        tapZone._penaltyApplied = false;
      }

      function resetReactionGame(){
        clearReactionState();
        msg.textContent = 'Get ready...';
        msg.style.color = '';
        tapZone.className = 'tapZone';
        tapZone.textContent = 'Wait for GO';
        area.style.display = 'none';
      }

      function applyFalseStartPenalty(){
        if (tapZone._penaltyApplied) return;
        tapZone._penaltyApplied = true;
        var adopted = loadAdopted();
        if (!adopted || !run) return;
        run.withSuccessHandler(function(res){
          refreshBalance();
        }).withFailureHandler(function(){
          // ignore failures for penalty
        }).spendOnGame({ character_name: adopted.name, game_name: 'Reaction Tap False Start' });
      }

      tapZone.addEventListener('click', function(){
        if (tapZone._done) return;
        if (!tapZone._goShown){
          if (goInterval) { clearInterval(goInterval); goInterval = null; }
          tapZone._done = true;
          applyFalseStartPenalty();
          msg.textContent = 'False Start';
          msg.style.color = 'var(--bad)';
          tapZone.textContent = 'False Start -1 nugget';
          tapZone.className = 'tapZone';
          setTimeout(resetReactionGame, RESULT_DELAY_MS);
          return;
        }
        if (!tapZone._start) return;
        tapZone._done = true;
        var ms = Date.now() - tapZone._start;
        msg.textContent = ms + ' ms';
        msg.style.color = '';

    function wireDailyHuntNugget(){
      var nuggetEl = el('dailyHuntNuggetEl');

      nuggetEl.addEventListener('click', function(){
        var adopted = loadAdopted();
        if (!adopted) return;
        callClaimDailyNuggetHunt(adopted.name).then(function(res){
          if (res && res.ok){
            if (window.MTSS_SFX && typeof window.MTSS_SFX.playChaChing === 'function') window.MTSS_SFX.playChaChing();
            var label = (res.rarity_label && res.rarity_label !== 'Common') ? ' ' + res.rarity_label + '!' : '';
            toast('+' + (res.nuggets || 1) + ' nugget' + ((res.nuggets || 1) !== 1 ? 's' : '') + label + ' — Hidden nugget found!');

            refreshDailyHunt();
            refreshBalance();
          }
        });
