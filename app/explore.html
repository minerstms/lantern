  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1b33;
      --ink:#eaf0ff;
      --muted:#b9c6ea;
      --accent:#5aa7ff;
      --good:#38d07c;
      --warn:#ffcc66;
      --line: rgba(255,255,255,.12);
      --shadow: 0 12px 28px rgba(0,0,0,.35);
      --r: 18px;
      --blue1:#0f3b86;
      --blue2:#1e63d6;
      --fsBase: 22px;
      --fsButton: 28px;
    }
    *{box-sizing:border-box}
    html{ min-height: 100%; }
    html,body{ height: 100%; margin: 0; }
    body{
      background:
        radial-gradient(1200px 600px at 50% 0%, #0b244f 0%, rgba(11,36,79,0) 55%),
        radial-gradient(900px 500px at 20% 30%, rgba(46,105,214,.18) 0%, rgba(46,105,214,0) 60%),
        linear-gradient(180deg, #070b12, #05070b);
      background-attachment: fixed;
      color:var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x:hidden;
      font-size: var(--fsBase);
    }
    a{color:inherit; text-decoration:none;}

    /* Outer shell: lantern-header.css .wrap.lanternContent (max-width + gutters) */
    .wrap.lanternContent.explorePageWrap{ position: relative; }

    .filterChip{
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.2);
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: all .15s ease;
    }
    .filterChip:hover{ color: var(--ink); background: rgba(255,255,255,.08); }
    .filterChip.active{ background: rgba(90,167,255,.2); border-color: rgba(90,167,255,.5); color: var(--ink); }

    /* Rails: space apart like separate modes, not one stacked column */
    .explorePageWrap > .section{
      margin-bottom: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      overflow: visible;
    }
    .explorePageWrap > .section + .section{ margin-top: 44px; }
    @media (min-width: 720px){
      .explorePageWrap > .section + .section{ margin-top: 56px; }
    }
    /* Lantern home: one section + one scroller pattern per row. */
    .sectionHd{ font-weight: 900; font-size: 26px; margin-bottom: 4px; letter-spacing: .2px; padding: 14px var(--lantern-pad-x) 0; }
    .sectionSub{ color: var(--muted); font-size: 22px; font-weight: 800; margin-top: -2px; margin-bottom: 12px; padding: 0 var(--lantern-pad-x); line-height: 1.35; }
    .sectionSubLane{ font-size: 20px; font-weight: 800; margin-bottom: 8px; margin-top: 0; padding: 4px var(--lantern-pad-x) 0; line-height: 1.35; color: var(--muted); }
    .sectionSubLane--spaced{ margin-top: 18px; }
    /* Horizontal scrollers + rail card chrome: lantern-cards.css (.wrap.lanternContent .lanternScroller) */
    .sectionPlaceholder{ color: var(--muted); font-size: 22px; padding: 32px 20px; text-align: center; line-height: 1.4; }
    .emptyState{ text-align: center; padding: 32px 20px; }
    .emptyStateIcon{ font-size: 48px; margin-bottom: 14px; opacity: .6; }
    .emptyStateTitle{ font-weight: 900; font-size: 26px; margin-bottom: 8px; }
    .emptyStateHint{ color: var(--muted); font-size: 22px; line-height: 1.45; }

    .exploreUrl{
      display: inline-block;
      margin-top: 10px;
      color: var(--accent);
      font-size: 20px;
      font-weight: 800;
      word-break: break-all;
    }
    .exploreUrl:hover{ text-decoration: underline; }
    .launchBtn{
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(90,167,255,.25);
      border: 1px solid rgba(90,167,255,.5);
      color: var(--ink);
      font-weight: 800;
      font-size: 20px;
    }
    .launchBtn:hover{ background: rgba(90,167,255,.35); }
    .exploreReportWrap .reportContentBtn{ background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0; text-decoration: underline; }
    .exploreReportWrap .reportContentBtn:hover{ color: var(--accent); }
    .videoCardWrap{ margin-top: 12px; position: relative; border-radius: 14px; overflow: hidden; background: linear-gradient(135deg, rgba(255,77,109,.25), rgba(90,50,120,.35)); min-height: 140px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,77,109,.3); }
    .videoCardWrap .videoPreviewImg{ position: absolute; inset: 0; }
    .videoCardWrap .videoPreviewImg img{ width: 100%; height: 100%; object-fit: cover; }
    .videoCardWrap .playIcon{ font-size: 56px; opacity: .9; z-index: 2; text-shadow: 0 2px 12px rgba(0,0,0,.6); }
    .videoCardWrap .launchBtn{ position: absolute; bottom: 12px; right: 12px; z-index: 2; margin: 0; padding: 10px 18px; font-size: 20px; background: linear-gradient(180deg, rgba(255,77,109,.4), rgba(255,77,109,.2)); border: 2px solid rgba(255,77,109,.5); }
    .videoCardWrap.videoCardFallback{ flex-direction: column; gap: 8px; padding: 20px; }
    .videoCardWrap .videoFallbackTitle{ font-weight: 900; font-size: 22px; text-align: center; z-index: 2; }
    .videoCardWrap .videoFallbackAuthor{ font-size: 18px; color: var(--muted); z-index: 2; }

    .dailyHuntHint{
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid rgba(242,194,48,.4);
      background: rgba(242,194,48,.12);
      font-size: 22px;
      font-weight: 800;
      color: var(--warn);
      text-align: center;
    }
    .dailyHuntHint.found{ border-color: rgba(56,208,124,.4); background: rgba(56,208,124,.12); color: var(--good); }
    .dailyHuntNugget{
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      animation: dailyHuntSparkle 2s ease-in-out infinite;
      opacity: 0.82;
    }
    .dailyHuntNugget img{ width: 36px; height: 36px; object-fit: contain; }
    .dailyHuntNugget:hover{ opacity: 1; transform: scale(1.12); }
    .dailyHuntNugget:active{ transform: scale(0.95); }
    @keyframes dailyHuntSparkle{
      0%,100%{ filter: drop-shadow(0 0 6px rgba(242,194,48,.6)); opacity: 0.9; }
      50%{ filter: drop-shadow(0 0 14px rgba(242,194,48,.9)); opacity: 1; }
    }
    .pollCard .pollQuestion{ font-weight: 800; font-size: 22px; margin-bottom: 8px; line-height: 1.3; }
  </style>
</head>
<body class="page-has-ticker">
  <script>
  (function(){
    if (!window.LanternPilotAuth) { document.documentElement.classList.remove('lantern-pilot-auth-pending'); return; }
    window.LanternPilotAuth.fetchMe().then(function(data){
      if (!data || !data.ok || !data.authenticated) {
        location.replace(window.LanternPilotAuth.loginUrlWithReturn());
        return;
      }
      var r = (data.role || '').trim();
      if (r === 'admin') {
        location.replace('/admin');
        return;
      }
      if (r === 'teacher') {
        location.replace('/teacher');
        return;
      }
      if (r === 'student') {
        window.LanternPilotAuth.applyStudentStorageFromSession(data);
      }
      document.documentElement.classList.remove('lantern-pilot-auth-pending');
    });
  })();
  </script>

    <!--
      Explore section grammar (surface contract): Each main row is .section with .sectionHd. No .sectionBd on this page.
      One-lane rows: .sectionHd, then one .lanternScroller.
      Multi-lane rows: .sectionHd, then each lane is .sectionSubLane (optional .sectionSubLane--spaced) + .lanternScroller.
      Do not rename IDs here — scripts and loaders depend on them.
    -->

    <!-- Section: Just In — newest live student-facing items first (same card pool + order as Latest Posts; spotlight rail only) -->

      <div id="announcementsRailWrap">
        <div id="bestEl" data-lantern-rail-host="true"></div>
      </div>
    </div>

    <!-- Section: Missions & Actions — two sub-lanes (Missions spotlight + Polls), each .sectionSubLane then .lanternScroller -->
    <div class="section" id="youCanDoSection" data-help="you_can_do">

    <!-- Section: Latest Posts (merged feed rail) -->

  <script>
    (function(){ try { if (window.LANTERN_DATA) { if (window.LANTERN_DATA.ensureCharacters) window.LANTERN_DATA.ensureCharacters(); if (window.LANTERN_DATA.ensureCatalog) window.LANTERN_DATA.ensureCatalog(); if (window.LANTERN_DATA.ensureStartupMode) window.LANTERN_DATA.ensureStartupMode(); } } catch(e){} })();

    var createRun = (typeof LANTERN_API !== 'undefined' && LANTERN_API.createRun) ? LANTERN_API.createRun : null;
    var el = function(id){ return document.getElementById(id); };

    var LC = function(){ return window.LanternCards; };
    var feed = [];
    var cachedApprovedNews = [];
    var happeningNewsLimit = 12;

    function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return c==='&'?'&amp;':c==='<'?'&lt;':c==='>'?'&gt;':c==='"'?'&quot;':'&#39;'; }); }

    /* Feed cards: no raw URL or action buttons in body. Whole card is the click target. */
    function buildUrlBlock(p){
      return '';
    }

    function filterPosts(posts){
      return posts;
    }

    function renderCard(p, container, size, sectionKey){
      if (!LC()) return;
      var sk = sectionKey || 'new';
      var flags = { teacher_pick: !!p.teacher_pick, teacher_featured: !!p.teacher_featured };
      var pipeline = '';
      if (sk === 'best') pipeline = p.teacher_pick ? 'teacher_pick_rail' : (p.teacher_featured ? 'teacher_featured_rail' : '');
      else if (sk === 'just_in') pipeline = 'just_in';
      else if (sk === 'new') pipeline = 'chronological';
      var routeSurface = sk === 'best' ? 'explore_best' : (sk === 'just_in' ? 'explore_just_in' : 'explore_new');
      var routeHelp = { surface: routeSurface, pipeline: pipeline, flags: flags };
      var adopted = getAdopted();
      var cn = adopted && adopted.name ? adopted.name : '';
      var card = LC().materializeFeedPostCard(p, {
        size: size || 'medium',
        routeHelp: routeHelp,
        mode: LC().CARD_MODE.RAIL,
        noNavigate: true,
        onCardActivate: function (post) {
          if (window.LanternCardUI) window.LanternCardUI.openCreation(post, { characterName: cn });
        }
      });
      container.appendChild(card);
    }

    function renderSection(containerId, posts, limit, sectionKey){
      var container = el(containerId);
      if (!container) return;
      container.innerHTML = '';
      var filtered = filterPosts(posts);
      var toShow = limit ? filtered.slice(0, limit) : filtered;
      toShow.forEach(function(p){ renderCard(p, container, 'medium', sectionKey || 'new'); });
    }

    function postsForNewRail(){
      var recent = feed.slice().sort(function(a, b){ return (b.created_at || '').localeCompare(a.created_at || ''); });
      return recent;
    }

    /** Newest-first spotlight from the same merged `feed` as Latest Posts (no extra fetch). */
    function renderJustInRail(){
      var container = el('justInEl');
      if (!container) return;
      container.innerHTML = '';
      var ordered = postsForNewRail();
      if (!ordered.length){
        container.innerHTML = '<div class="emptyState"><div class="emptyStateIcon">✨</div><div class="emptyStateTitle">Nothing here yet</div><div class="emptyStateHint">When classmates share work, the newest pieces show up here first.</div></div>';
        return;
      }
      var limit = 30;
      ordered.slice(0, limit).forEach(function(p){ renderCard(p, container, 'medium', 'just_in'); });
    }

    function appendOfficialNewsCardToContainer(container, n){
      if (!container || !LC() || !LC().specNewsRailCard || !LC().createStudentCard) return;
      var authorLabel = getAuthorLabel(n.author_type || 'student');
      var adoptedForNews = getAdopted();
      var cn = adoptedForNews ? (adoptedForNews.name || '') : '';
      var card = LC().createStudentCard(LC().specNewsRailCard(n, esc, authorLabel, false));
      if (!card) return;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.style.cursor = 'pointer';
      card.classList.add('exploreCard--activatable');
      if (LC().enhanceReportControlsIn) LC().enhanceReportControlsIn(card);
      card.addEventListener('click', function(e){
        if (e.target.closest('.exploreCardReportBtn')) return;
        if (window.LanternCardUI) window.LanternCardUI.openNews(n, { characterName: cn });
      });
      card.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          if (e.target.closest('.exploreCardReportBtn')) return;
          if (window.LanternCardUI) window.LanternCardUI.openNews(n, { characterName: cn });
        }
      });
      container.appendChild(card);
    }

    function renderFeaturedAnnouncementsRail(){
      var bestSec = el('bestSection');
      var bestEl = el('bestEl');
      if (!bestSec || !bestEl) return;
      bestEl.innerHTML = '';
      var officialNews = (cachedApprovedNews || []).filter(function(n){
        if (!n || String(n.status || '').toLowerCase() !== 'approved') return false;
        var t = String(n.author_type || 'student').toLowerCase();
        return t === 'teacher' || t === 'staff' || t === 'admin';
      }).sort(function(a, b){
        return (b.approved_at || b.created_at || '').localeCompare(a.approved_at || a.created_at || '');
      });
      var bestPosts = [];
      var seen = {};
      feed.forEach(function(p){
        if ((p.teacher_pick || p.teacher_featured) && p.id != null && String(p.id) !== '' && !seen[p.id]){
          seen[p.id] = true;
          bestPosts.push(p);
        }
      });
      bestPosts.sort(function(a, b){
        var ap = a.teacher_pick ? 2 : (a.teacher_featured ? 1 : 0);
        var bp = b.teacher_pick ? 2 : (b.teacher_featured ? 1 : 0);
        if (bp !== ap) return bp - ap;
        return (b.created_at || '').localeCompare(a.created_at || '');
      });
      var filteredBest = filterPosts(bestPosts);
      if (!officialNews.length && !filteredBest.length){
        bestEl.innerHTML = '<div class="emptyState"><div class="emptyStateIcon">⭐</div><div class="emptyStateTitle">No featured items yet</div><div class="emptyStateHint">Official announcements from staff and teacher picks or featured work will appear here.</div></div>';
        return;
      }
      var maxFeaturedRail = 12;
      function paintFeaturedRail(resolvedOfficial){
        bestEl.innerHTML = '';
        var featuredShown = 0;
        (resolvedOfficial || []).forEach(function(n){
          if (featuredShown >= maxFeaturedRail) return;
          appendOfficialNewsCardToContainer(bestEl, n);
          featuredShown++;
        });
        filteredBest.forEach(function(p){
          if (featuredShown >= maxFeaturedRail) return;
          renderCard(p, bestEl, 'medium', 'best');
          featuredShown++;
        });
      }
      if (window.LanternAvatar && typeof window.LanternAvatar.attachCanonicalAvatarsToItems === 'function' && officialNews.length) {
        var onews = officialNews.slice();
        paintFeaturedRail(onews);
        window.LanternAvatar.attachCanonicalAvatarsToItems(onews).then(function(){ paintFeaturedRail(onews); });
      } else {
        paintFeaturedRail(officialNews);
      }
    }

    function renderAll(){
      renderJustInRail();
      renderFeaturedAnnouncementsRail();
      var pr = postsForNewRail();
      var recentContainer = el('recentEl');
      if (recentContainer){
        renderSection('recentEl', pr, 30, 'new');
      }
      try { console.log('[explore] New rail: ' + pr.length + ' items'); } catch(_) {}

      var schoolSmartsEl = el('schoolSmartsEl');
      if (schoolSmartsEl){
        schoolSmartsEl.innerHTML = '';
        var lc = LC();
        var items = [
          { id: 'mini_games_hub', title: 'Games hub', description: 'Arcade, trivia, and weekly scores.', card_meta: 'Open the full games page.', href: 'games.html' },
          { id: 'learning_school_survival', title: 'School Survival', description: 'Handbook scenarios — tap answers, see why. TMS Edition.', card_meta: 'Handbook scenarios — tap answers, see why. TMS Edition.', href: 'school-survival.html' },
          { id: 'learning_trinidad_co', title: 'Know Your Town', description: 'Trinidad, CO — picture clues, name the place.', card_meta: 'Trinidad, CO — picture clues, name the place.', href: 'school-survival.html?pack=trinidad-co' },
          { id: 'mini_games_avatar', title: 'Avatar Match', description: 'Match pairs and climb the board.', card_meta: 'Weekly leaderboard on Games.', href: 'games.html' },
          { id: 'mini_games_trivia', title: 'Handbook Trivia', description: 'Quick quiz from the handbook.', card_meta: 'Play on Games.', href: 'games.html' },
          { id: 'mini_games_history', title: 'Local History Trivia', description: 'Town trivia — picture clues.', card_meta: 'Play on Games.', href: 'games.html' },
          { id: 'mini_games_reaction', title: 'Reaction Tap', description: 'Fast taps — lowest time wins.', card_meta: 'Play on Games.', href: 'games.html' },
          { id: 'mini_games_clickrush', title: 'Nugget Click Rush', description: 'Click streak challenge.', card_meta: 'Play on Games.', href: 'games.html' }
        ];
        items.forEach(function(item){
          var postModel = {
            id: item.id || ('learning_' + String(item.href || '').replace(/[^a-z0-9]+/gi, '_').replace(/^_|_$/g, '').toLowerCase()),
            type: 'teach',
            title: item.title,
            description: item.description,
            card_meta: item.card_meta
          };
          var card = lc.materializeFeedPostCard(postModel, {
            size: 'medium',
            mode: lc.CARD_MODE.RAIL,
            onCardActivate: function(){
              window.location.href = item.href;
            }
          });
          schoolSmartsEl.appendChild(card);
        });
      }
      if (typeof applyExploreSearch === 'function') applyExploreSearch();
    }

    function callGetExploreFeed(){
      var run = createRun ? createRun() : null;
      if (!run) return Promise.resolve({ ok: false, feed: [] });
      return new Promise(function(resolve){
        run.withSuccessHandler(function(r){ resolve(r); }).withFailureHandler(function(){ resolve({ ok: false, feed: [] }); }).getExploreFeed();
      });
    }

    function callGetActivityEvents(limit){
      var run = createRun ? createRun() : null;
      if (!run) return Promise.resolve({ ok: false, events: [] });
      return new Promise(function(resolve){

    /** Latest Posts rail: normalized post + mission_submission only, chrono desc, then map.raw → feed rows. */
    function applyLatestPostsFromExploreDataset(dataset){
      var LEDS = window.LANTERN_EXPLORE_DATASET;
      if (!LEDS || !dataset || !dataset.byKind) return false;
      var K = LEDS.CONTENT_KIND;
      var postsNorm = dataset.byKind[K.POST] || [];
      var missNorm = dataset.byKind[K.MISSION_SUBMISSION] || [];
      var merged = postsNorm.concat(missNorm);
      merged.sort(function(a, b){ return (b.created_at || '').localeCompare(a.created_at || ''); });
      feed = merged.map(function(it){
        if (it.kind === K.MISSION_SUBMISSION) return mapApprovedSubmissionToFeedPost(it.raw);
        return it.raw;
      });
      try { console.log('[explore] latest from dataset posts=' + postsNorm.length + ' missions=' + missNorm.length + ' total=' + feed.length + ' dupes_dropped_global=' + (dataset.duplicates_dropped != null ? dataset.duplicates_dropped : '?')); } catch(_) {}
      return true;
    }

    function loadLatestPostsLegacyMergeThenRender(){
      var postsPromise = callGetExploreFeed();
      var approvedPromise = exploreApiBase ? fetch(exploreApiBase + '/api/missions/submissions/approved?limit=30').then(function(r){ return r.json(); }).then(function(res){ return (res && Array.isArray(res.submissions)) ? res.submissions : (res && res.submissions) ? res.submissions : []; }).catch(function(){ return []; }) : Promise.resolve([]);
      Promise.all([postsPromise, approvedPromise]).then(function(arr){
        var postsFeed = (arr[0] && arr[0].feed) || [];
        var approvedSubs = arr[1] || [];
        var missionItems = approvedSubs.map(mapApprovedSubmissionToFeedPost);
        try { if (missionItems.length) console.log('[explore] one approved mission before merge (legacy)', missionItems[0]); } catch(_) {}
        feed = postsFeed.concat(missionItems).sort(function(a, b){ return (b.created_at || '').localeCompare(a.created_at || ''); });
        try { console.log('[explore] visible feed source (legacy): posts=' + postsFeed.length + ' missions=' + missionItems.length + ' total=' + feed.length); } catch(_) {}
        enrichFeedAvatarsThenRenderAll();
      });

            if (!applyLatestPostsFromExploreDataset(dataset)) {
              loadLatestPostsLegacyMergeThenRender();
              return;
            }
            enrichFeedAvatarsThenRenderAll();
          })
          .catch(function(){
            loadLatestPostsLegacyMergeThenRender();
          });
      } else {
        loadLatestPostsLegacyMergeThenRender();
      }
      happeningNewsLimit = 12;
      if (window.LANTERN_REACTIONS && window.LANTERN_REACTIONS.getFeatureFlags) {
        window.LANTERN_REACTIONS.getFeatureFlags().then(function(){
          callGetApprovedNews().then(function(res){ renderStudentNews((res && res.news) || []); });
        });
      } else {
        callGetApprovedNews().then(function(res){ renderStudentNews((res && res.news) || []); });
      }
      callGetActivityEvents(12).then(function(res){
        var events = (res && res.events) || [];
        renderSchoolActivity(events);
      });
      refreshDailyHunt();
    }

    (function(){
      var nuggetEl = el('dailyHuntNuggetEl');
      if (nuggetEl){
        nuggetEl.addEventListener('click', function(){
          var adopted = getAdopted();
          if (!adopted){ alert('Pick a student in Locker → Overview to claim.'); return; }
          callClaimDailyNuggetHunt(adopted.name).then(function(res){
            if (res && res.ok){
              if (window.MTSS_SFX && typeof window.MTSS_SFX.playChaChing === 'function') window.MTSS_SFX.playChaChing();
              var label = (res.rarity_label && res.rarity_label !== 'Common') ? ' ' + res.rarity_label + '!' : '';
              var t = el('toast');
              if (t){ t.textContent = '+' + (res.nuggets || 1) + ' nugget' + ((res.nuggets || 1) !== 1 ? 's' : '') + label + ' — Hidden nugget found!'; t.style.display = 'block'; setTimeout(function(){ t.style.display = 'none'; }, 2400); }
              nuggetEl.style.display = 'none';
              refreshDailyHunt();
            } else if (res && res.already){
              refreshDailyHunt();
            }
          });
        });
      }
    })();

    function applyExploreSearch(){
      var searchInput = document.getElementById('lanternExploreSearch');
      if (!searchInput) return;
      var query = (searchInput.value || '').trim().toLowerCase();
      var cards = document.querySelectorAll('.exploreCard');
      cards.forEach(function(card){
        var text = (card.textContent || '').toLowerCase();
        if (query === '' || text.indexOf(query) !== -1) card.style.display = '';
        else card.style.display = 'none';
      });
    }
    (function(){
      var searchInput = document.getElementById('lanternExploreSearch');
      if (!searchInput) return;
      searchInput.addEventListener('input', applyExploreSearch);
    })();

    document.addEventListener('lantern-class-access-resolved', function(e){ if (e.detail && e.detail.tokenValid && typeof refresh === 'function') refresh(); });
  </script>
  <div id="toast" style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.12);color:#eaf0ff;padding:12px 14px;border-radius:14px;display:none;z-index:10001;font-weight:900;font-size:22px;"></div>
  <script src="js/lantern-canonical-enforce.js"></script>
</body>
