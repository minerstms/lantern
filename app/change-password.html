<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TMS Lantern — Choose a new password</title>
  <script>window.LANTERN_AVATAR_API = 'https://lantern-api.mrradle.workers.dev';</script>
  <script src="js/lantern-pilot-auth.js"></script>
  <style>
    :root { --ink:#eaf0ff; --muted:#b9c6ea; --accent:#5aa7ff; --line:rgba(255,255,255,.12); }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 28px 18px 48px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 22px; color: var(--ink);
      background: linear-gradient(180deg, #070b12, #05070b);
    }
    .wrap { max-width: 440px; margin: 0 auto; }
    h1 { font-size: 30px; font-weight: 900; margin: 0 0 10px; }
    .sub { color: var(--muted); font-size: 22px; margin-bottom: 22px; line-height: 1.45; }
    label { display: block; font-weight: 800; margin-top: 18px; margin-bottom: 8px; font-size: 22px; }
    input[type="password"] {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(0,0,0,.35); color: var(--ink); font-size: 22px; font-family: inherit;
    }
    .btn {
      margin-top: 28px; width: 100%; padding: 16px 20px; border-radius: 14px; border: 1px solid rgba(90,167,255,.5);
      background: rgba(90,167,255,.28); color: var(--ink); font-size: 26px; font-weight: 800; cursor: pointer; font-family: inherit;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #msg { margin-top: 20px; padding: 14px 16px; border-radius: 12px; font-size: 22px; font-weight: 800; line-height: 1.4; min-height: 0; }
    #msg.error { background: rgba(255,100,100,.12); border: 1px solid rgba(255,100,100,.35); color: #ffb4b4; }
    #shell { display: none; }
    #shell.visible { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>New password required</h1>
    <p class="sub">Your administrator assigned a temporary password. Set a new password (at least 8 characters) to continue.</p>
    <div id="msg" style="display:none;" role="status" aria-live="polite"></div>
    <div id="shell">
      <form id="pwForm" novalidate>
        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" autocomplete="new-password" required minlength="8" />
        <label for="confirm_password">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required minlength="8" />
        <button type="submit" class="btn" id="submitBtn">Save and continue</button>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var api = window.LANTERN_AVATAR_API ? String(window.LANTERN_AVATAR_API).replace(/\/$/, '') : '';
      var msgEl = document.getElementById('msg');
      var shell = document.getElementById('shell');
      var form = document.getElementById('pwForm');
      var submitBtn = document.getElementById('submitBtn');

      function qs(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
      }
      /** Same-origin path only: leading /, not protocol-relative // */
      function isSafeReturnPath(p) {
        var s = String(p || '').trim();
        if (!s || s.charAt(0) !== '/') return false;
        if (s.indexOf('//') === 0) return false;
        return true;
      }
      var qsReturn = qs('return');
      var returnTo = qsReturn;
      if (!returnTo || returnTo.indexOf('change-password') !== -1) returnTo = '/explore.html';
      else if (!isSafeReturnPath(returnTo)) returnTo = '/explore.html';

      function showError(text) {
        msgEl.style.display = 'block';
        msgEl.className = 'error';
        msgEl.textContent = text;
      }

      function redirectByRole(me) {
        var r = (me && me.role ? String(me.role) : '').trim();
        if (r === 'admin') {
          location.replace(
            isSafeReturnPath(qsReturn) &&
              qsReturn.indexOf('login.html') === -1 &&
              qsReturn.indexOf('/login') === -1 &&
              qsReturn.indexOf('change-password') === -1
              ? qsReturn
              : '/admin.html'
          );
          return;
        }
        if (r === 'teacher') {
          location.replace(
            isSafeReturnPath(qsReturn) &&
              qsReturn.indexOf('login.html') === -1 &&
              qsReturn.indexOf('/login') === -1 &&
              qsReturn.indexOf('change-password') === -1
              ? qsReturn
              : '/teacher.html'
          );
          return;
        }
        if (r === 'student') {
          if (window.LanternPilotAuth && window.LanternPilotAuth.applyStudentStorageFromLoginResponse) {
            window.LanternPilotAuth.applyStudentStorageFromLoginResponse(me);
          }
          location.replace(returnTo || '/explore.html');
          return;
        }
        location.replace(returnTo || '/explore.html');
      }

      if (!api || !window.LanternAuth) {
        showError('Configure window.LANTERN_AVATAR_API to your API base URL.');
        return;
      }

      window.LanternAuth.fetchMe().then(function (data) {
        if (!data || !data.ok || !data.authenticated) {
          location.replace(window.LanternAuth.loginUrlWithReturn());
          return;
        }
        if (!data.must_change_password) {
          redirectByRole(data);
          return;
        }
        shell.classList.add('visible');
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var a = document.getElementById('new_password').value || '';
        var b = document.getElementById('confirm_password').value || '';
        msgEl.style.display = 'none';
        msgEl.textContent = '';
        msgEl.className = '';
        if (a.length < 8) {
          showError('Password must be at least 8 characters.');
          return;
        }
        if (a !== b) {
          showError('Passwords do not match.');
          return;
        }
        submitBtn.disabled = true;
        fetch(api + '/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ new_password: a }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { okHttp: r.ok, body: j };
            });
          })
          .then(function (res) {
            if (res.okHttp && res.body && res.body.ok === true) {
              return window.LanternAuth.fetchMe().then(function (me) {
                if (me && me.ok && me.authenticated) {
                  redirectByRole(me);
                } else {
                  location.replace('/login.html');
                }
              });
            }
            var err = (res.body && (res.body.error || res.body.message)) || 'Could not update password.';
            showError(String(err));
          })
          .catch(function () {
            showError('Network error. Try again.');
          })
          .finally(function () {
            submitBtn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
