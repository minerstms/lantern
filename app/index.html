<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base target="_top" />
  <title>TMS Lantern — Locker</title>
  <script>window.LANTERN_AVATAR_API = 'https://lantern-api.mrradle.workers.dev';</script>
  <script src="js/lantern-pilot-auth.js"></script>
  <script>
  (function () {
    try {
      var q = typeof location !== 'undefined' ? (location.search || '') : '';
      if (/[?&]noLockerRedirect=1(?:&|$)/.test(q)) return;
      var path = (typeof location !== 'undefined' && location.pathname) ? location.pathname : '/';
      path = path.replace(/\/$/, '') || '/';
      if (path !== '/') return;
      if (window.LanternAuth && typeof window.LanternAuth.loginUrlWithReturn === 'function') {
        location.replace(window.LanternAuth.loginUrlWithReturn());
      } else {
        try {
          sessionStorage.setItem('lantern_return_to', '/');
        } catch (e) {}
        location.replace('/login.html?return=%2F');
      }
    } catch (e) {}
  })();
  </script>
</head>
<body style="margin:0;background:#0b1220;color:#eaf0ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
  <p style="font-size:28px;padding:20px 16px;margin:0;">Opening sign-in…</p>
  <p style="font-size:22px;padding:0 16px 24px;margin:0;">
    <a id="indexLoginContinue" href="/login.html?return=%2F" style="color:#5aa7ff;font-weight:800;">Continue to sign in</a>
  </p>
  <script>
    (function () {
      try {
        var a = document.getElementById('indexLoginContinue');
        if (a && window.LanternAuth && typeof window.LanternAuth.loginUrlWithReturn === 'function') {
          a.href = window.LanternAuth.loginUrlWithReturn();
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
